name: Registrar cliente en CRM WebAgency

on:
  push:
    branches: [main]

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Registrar CRM BigTooth en CRM interno
        run: |
          curl -s -X POST "https://webagency-bilbao-crm.netlify.app/api/proxy?action=onboarding" \
            -H "Content-Type: application/json" \
            -H "x-proxy-secret: wab-proxy-2025" \
            -d '{
              "cliente": {
                "nombre": "Clínica BigTooth",
                "sector": "dental",
                "zona": "Deusto, Bilbao",
                "email": "info@bigtooth.es",
                "telefono": "+34 944 123 456",
                "plan": "premium",
                "url_web": "https://clinica-bigtooth.netlify.app",
                "url_crm": "https://clinica-bigtooth-crm.netlify.app",
                "repo_github": "https://github.com/dondifer/clinica-bigtooth-crm",
                "notas": "Ecosistema Premium — CRM dental. Módulos: pacientes, agenda, tratamientos, presupuestos, facturas, radiografías."
              },
              "proyecto": {
                "nombre": "Ecosistema Premium BigTooth",
                "tipo": "Ecosistema Premium",
                "valor": 1800,
                "fecha_entrega": "2025-06-27",
                "notas": "CRM dental HTML completo. Navegación SPA, modales, datos ficticios realistas Bilbao."
              }
            }' | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('ok'):
              print('✅', d.get('mensaje', 'Registrado'))
          else:
              print('⚠️ Ya registrado o error:', d)
          "
